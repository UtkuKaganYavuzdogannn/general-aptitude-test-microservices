version: '3.8'

services:
  management-db:
    image: postgres:16-alpine
    container_name: management-db-container
    environment:
      POSTGRES_DB: db_management
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: management_pass
    ports:
      - "5433:5432"
    volumes:
      - management_db_vol:/var/lib/postgresql/data

  question-db:
    image: postgres:16-alpine
    container_name: question-db-container
    environment:
      POSTGRES_DB: db_question
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: question_pass
    ports:
      - "5434:5432"
    volumes:
      - question_db_vol:/var/lib/postgresql/data

  exam-db:
    image: postgres:16-alpine
    container_name: exam-db-container
    environment:
      POSTGRES_DB: db_exam
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: exam_pass
    ports:
      - "5435:5432"
    volumes:
      - exam_db_vol:/var/lib/postgresql/data

volumes:
  management_db_vol:
  question_db_vol:
  exam_db_vol: