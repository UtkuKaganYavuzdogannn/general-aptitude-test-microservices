server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: management-service-route
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/management/**

        - id: question-service-route
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/questions/**

        - id: exam-service-route
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/exams/**