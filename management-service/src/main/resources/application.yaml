server:
  port: 8081

spring:
  application:
    name: management-service

  datasource:
    url: jdbc:postgresql://localhost:5433/db_management
    username: postgres
    password: management_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect